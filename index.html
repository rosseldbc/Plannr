<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend — wat doen we?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --sand: #F2EDE4;
    --clay: #C8A882;
    --moss: #7A8C6E;
    --dusk: #3D3530;
    --fog: #E8E2D9;
    --white: #FDFAF6;
    --date: #B05C3A;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--sand);
    font-family: 'DM Sans', sans-serif;
    color: var(--dusk);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--white);
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--fog);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--dusk);
    line-height: 1.1;
  }

  header p {
    font-size: 0.82rem;
    color: var(--clay);
    margin-top: 4px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .container { max-width: 480px; margin: 0 auto; padding: 0 20px; }

  /* MOOD SECTION */
  .section { margin-top: 28px; }

  .section-label {
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--clay);
    margin-bottom: 12px;
  }

  .mood-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .mood-btn {
    background: var(--white);
    border: 1.5px solid var(--fog);
    border-radius: var(--radius);
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s ease;
    font-family: 'DM Sans', sans-serif;
  }

  .mood-btn:hover { border-color: var(--clay); }

  .mood-btn.active {
    background: var(--dusk);
    border-color: var(--dusk);
    color: var(--white);
  }

  .mood-btn .emoji { font-size: 1.5rem; display: block; margin-bottom: 5px; }
  .mood-btn .label { font-size: 0.75rem; font-weight: 500; }

  /* TOGGLES */
  .toggles { display: flex; gap: 10px; flex-wrap: wrap; }

  .toggle-btn {
    background: var(--white);
    border: 1.5px solid var(--fog);
    border-radius: 100px;
    padding: 8px 16px;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s ease;
    color: var(--dusk);
  }

  .toggle-btn:hover { border-color: var(--clay); }

  .toggle-btn.active {
    background: var(--moss);
    border-color: var(--moss);
    color: white;
  }

  .toggle-btn.date-mode.active {
    background: var(--date);
    border-color: var(--date);
  }

  /* SUGGEST BUTTON */
  .suggest-btn {
    width: 100%;
    background: var(--dusk);
    color: var(--white);
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    font-size: 1rem;
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    cursor: pointer;
    margin-top: 28px;
    transition: opacity 0.15s;
    letter-spacing: 0.01em;
  }

  .suggest-btn:hover { opacity: 0.88; }
  .suggest-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* RESULTS */
  .results { margin-top: 28px; }

  .result-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    border: 1.5px solid var(--fog);
    position: relative;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:nth-child(1) { animation-delay: 0.05s; }
  .result-card:nth-child(2) { animation-delay: 0.15s; }
  .result-card:nth-child(3) { animation-delay: 0.25s; }
  .result-card:nth-child(4) { animation-delay: 0.35s; }
  .result-card:nth-child(5) { animation-delay: 0.45s; }

  .result-card .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .result-card h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    line-height: 1.3;
    flex: 1;
  }

  .save-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.3rem;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
    transition: transform 0.15s;
  }

  .save-btn:hover { transform: scale(1.2); }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .tag {
    background: var(--fog);
    border-radius: 100px;
    padding: 3px 10px;
    font-size: 0.7rem;
    font-weight: 500;
    color: var(--dusk);
  }

  .tag.toddler { background: #FDE8D0; color: #8B4513; }
  .tag.date { background: #F9DDD5; color: var(--date); }

  .card-desc {
    font-size: 0.84rem;
    color: #6B5E54;
    margin-top: 10px;
    line-height: 1.6;
    font-weight: 300;
  }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px 0;
  }

  .loading-dots {
    display: inline-flex;
    gap: 6px;
    align-items: center;
  }

  .loading-dots span {
    width: 8px;
    height: 8px;
    background: var(--clay);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  .loading p {
    font-size: 0.82rem;
    color: var(--clay);
    margin-top: 12px;
    font-style: italic;
  }

  /* SAVED */
  .saved-section { margin-top: 36px; }

  .saved-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .clear-saved {
    font-size: 0.72rem;
    color: var(--clay);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-decoration: underline;
  }

  .saved-pill {
    background: var(--white);
    border: 1.5px solid var(--fog);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .saved-pill span {
    font-size: 0.88rem;
    font-weight: 500;
  }

  .unsave-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    color: var(--clay);
    padding: 0;
  }

  .divider {
    height: 1px;
    background: var(--fog);
    margin: 32px 0;
  }

  .empty-saved {
    font-size: 0.82rem;
    color: var(--clay);
    font-style: italic;
    font-weight: 300;
  }

  /* WEATHER CARD */
  .weather-card {
    background: var(--white);
    border: 1.5px solid var(--fog);
    border-radius: var(--radius);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .weather-loading {
    font-size: 0.82rem;
    color: var(--clay);
    font-style: italic;
  }

  .weather-emoji { font-size: 2rem; flex-shrink: 0; }

  .weather-info { flex: 1; }

  .weather-desc {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--dusk);
  }

  .weather-sub {
    font-size: 0.75rem;
    color: var(--clay);
    margin-top: 2px;
    font-weight: 300;
  }

  .weather-error {
    font-size: 0.8rem;
    color: var(--clay);
  }

  .weather-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }

  .weather-tab {
    background: var(--white);
    border: 1.5px solid var(--fog);
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    color: var(--dusk);
    transition: all 0.15s;
  }

  .weather-tab.active {
    background: var(--dusk);
    border-color: var(--dusk);
    color: white;
  }
</style>
</head>
<body>

<header>
  <div class="container">
    <h1>Wat doen we dit weekend?</h1>
    <p>Voor Diego, Britt &amp; de kleine — activiteiten op maat</p>
  </div>
</header>

<div class="container">

  <!-- MOOD -->
  <div class="section">
    <div class="section-label">Onze stemming</div>
    <div class="mood-grid">
      <button class="mood-btn" data-mood="actief buiten" onclick="selectMood(this)">
        <span class="emoji">🌿</span>
        <span class="label">Actief buiten</span>
      </button>
      <button class="mood-btn" data-mood="rustig en gezellig" onclick="selectMood(this)">
        <span class="emoji">🛋️</span>
        <span class="label">Rustig & knus</span>
      </button>
      <button class="mood-btn" data-mood="cultuur en stadsbezoek" onclick="selectMood(this)">
        <span class="emoji">🏛️</span>
        <span class="label">Stad & cultuur</span>
      </button>
      <button class="mood-btn" data-mood="lekker eten en ontdekken" onclick="selectMood(this)">
        <span class="emoji">🍽️</span>
        <span class="label">Eten & drinken</span>
      </button>
      <button class="mood-btn" data-mood="creatief en speels" onclick="selectMood(this)">
        <span class="emoji">🎨</span>
        <span class="label">Creatief</span>
      </button>
      <button class="mood-btn" data-mood="avontuurlijk en verrassend" onclick="selectMood(this)">
        <span class="emoji">✨</span>
        <span class="label">Verrassing!</span>
      </button>
    </div>
  </div>

  <!-- TYPE -->
  <div class="section">
    <div class="section-label">Type activiteit</div>
    <div class="toggles">
      <button class="toggle-btn active" data-type="gezin" onclick="toggleType(this)">👨‍👩‍👧 Met z'n drieën</button>
      <button class="toggle-btn date-mode" data-type="date" onclick="toggleType(this)">🌙 Date-avond</button>
    </div>
  </div>

  <!-- WEATHER (auto) -->
  <div class="section">
    <div class="section-label">Weer</div>
    <div class="weather-tabs">
      <button class="weather-tab active" data-day="today" onclick="selectWeatherDay(this)">Vandaag</button>
      <button class="weather-tab" data-day="saturday" onclick="selectWeatherDay(this)">Zaterdag</button>
      <button class="weather-tab" data-day="sunday" onclick="selectWeatherDay(this)">Zondag</button>
    </div>
    <div id="weatherCard" class="weather-card">
      <div class="weather-loading">Locatie ophalen…</div>
    </div>
  </div>

  <button class="suggest-btn" onclick="getSuggestions()" id="suggestBtn">
    Stel activiteiten voor →
  </button>

  <!-- LOADING -->
  <div class="loading" id="loading" style="display:none">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p>Ideeën aan het zoeken…</p>
  </div>

  <!-- RESULTS -->
  <div class="results" id="results"></div>

  <!-- DIVIDER + SAVED -->
  <div class="divider" id="savedDivider" style="display:none"></div>

  <div class="saved-section" id="savedSection" style="display:none">
    <div class="saved-header">
      <div class="section-label" style="margin:0">Bewaard voor later</div>
      <button class="clear-saved" onclick="clearSaved()">Alles verwijderen</button>
    </div>
    <div id="savedList"></div>
  </div>

</div>

<script>
  let selectedMood = '';
  let selectedType = 'gezin';
  let selectedWeather = 'mooi weer';
  let selectedWeatherDay = 'today';
  let weatherData = {}; // keyed by 'today', 'saturday', 'sunday'
  let saved = JSON.parse(localStorage.getItem('weekend_saved') || '[]');

  function selectMood(btn) {
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedMood = btn.dataset.mood;
  }

  function toggleType(btn) {
    document.querySelectorAll('[data-type]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedType = btn.dataset.type;
  }

  function selectWeatherDay(btn) {
    document.querySelectorAll('.weather-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedWeatherDay = btn.dataset.day;
    if (weatherData[selectedWeatherDay]) {
      renderWeatherCard(weatherData[selectedWeatherDay]);
      selectedWeather = weatherData[selectedWeatherDay].label;
    }
  }

  function interpretWeather(code) {
    if (code === 0) return { emoji: '☀️', desc: 'Stralend zonnig', label: 'mooi en zonnig weer' };
    if (code <= 2) return { emoji: '⛅', desc: 'Gedeeltelijk bewolkt', label: 'bewolkt maar droog' };
    if (code === 3) return { emoji: '☁️', desc: 'Bewolkt', label: 'bewolkt of wisselvallig' };
    if (code <= 48) return { emoji: '🌫️', desc: 'Mist of nevel', label: 'bewolkt of wisselvallig' };
    if (code <= 57) return { emoji: '🌦️', desc: 'Lichte motregen', label: 'bewolkt of wisselvallig' };
    if (code <= 67) return { emoji: '🌧️', desc: 'Regen', label: 'slecht weer of regen' };
    if (code <= 77) return { emoji: '❄️', desc: 'Sneeuw', label: 'slecht weer of regen' };
    if (code <= 82) return { emoji: '🌧️', desc: 'Regenbuien', label: 'slecht weer of regen' };
    if (code <= 99) return { emoji: '⛈️', desc: 'Onweer', label: 'slecht weer of regen' };
    return { emoji: '🌥️', desc: 'Wisselvallig', label: 'bewolkt of wisselvallig' };
  }

  function renderWeatherCard(w) {
    const card = document.getElementById('weatherCard');
    card.innerHTML = `
      <span class="weather-emoji">${w.emoji}</span>
      <div class="weather-info">
        <div class="weather-desc">${w.desc}</div>
        <div class="weather-sub">${w.min}° – ${w.max}° · ${w.dateStr}</div>
      </div>
    `;
  }

  async function fetchWeather() {
    const card = document.getElementById('weatherCard');
    if (!navigator.geolocation) {
      card.innerHTML = `<span class="weather-error">Locatie niet beschikbaar.</span>`;
      return;
    }

    navigator.geolocation.getCurrentPosition(async (pos) => {
      const { latitude: lat, longitude: lon } = pos.coords;
      try {
        const today = new Date();
        const fmt = d => d.toISOString().split('T')[0];

        const daysToSat = ((6 - today.getDay()) + 7) % 7 || 7;
        const sat = new Date(today); sat.setDate(today.getDate() + daysToSat);
        const sun = new Date(sat); sun.setDate(sat.getDate() + 1);

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&hourly=weathercode,temperature_2m&timezone=Europe%2FBrussels&start_date=${fmt(today)}&end_date=${fmt(sun)}`;
        const res = await fetch(url);
        const data = await res.json();

        const dailyDates = data.daily.time;

        const buildDay = (dateStr, label) => {
          const idx = dailyDates.indexOf(dateStr);
          if (idx === -1) return null;
          const code = data.daily.weathercode[idx];
          const w = interpretWeather(code);
          return {
            ...w,
            max: Math.round(data.daily.temperature_2m_max[idx]),
            min: Math.round(data.daily.temperature_2m_min[idx]),
            dateStr: label
          };
        };

        const todayStr = fmt(today);
        const satStr = fmt(sat);
        const sunStr = fmt(sun);

        weatherData['today'] = buildDay(todayStr, 'vandaag');
        weatherData['saturday'] = buildDay(satStr, 'zaterdag ' + sat.getDate() + '/' + (sat.getMonth()+1));
        weatherData['sunday'] = buildDay(sunStr, 'zondag ' + sun.getDate() + '/' + (sun.getMonth()+1));

        // Show current tab
        const active = weatherData[selectedWeatherDay] || weatherData['today'];
        if (active) {
          renderWeatherCard(active);
          selectedWeather = active.label;
        }
      } catch (e) {
        card.innerHTML = `<span class="weather-error">Kon het weer niet ophalen.</span>`;
      }
    }, () => {
      card.innerHTML = `<span class="weather-error">Locatietoegang geweigerd.</span>`;
    });
  }

  async function getSuggestions() {
    if (!selectedMood) {
      alert('Kies eerst een stemming!');
      return;
    }

    const btn = document.getElementById('suggestBtn');
    btn.disabled = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('results').innerHTML = '';

    const isDate = selectedType === 'date';
    const prompt = isDate
      ? `Stel 4 romantische date-ideeën voor een koppel in België (regio Antwerpen/Gent) voor. Het zijn geen ouders die hun kind meenemen — dit is een avond of moment voor henzelf. Stemming: ${selectedMood}. Weer: ${selectedWeather}. Geef activiteiten die realistisch zijn in België en nu actueel zijn. Geef je antwoord ALLEEN als JSON array (geen uitleg, geen markdown), met exact dit formaat: [{"title":"...","description":"...","tags":["..."]}]. Tags kunnen zijn: 'romantisch', 'buiten', 'culinair', 'cultuur', 'avond', 'weekend'.`
      : `Stel 5 gezinsactiviteiten voor in België (regio Antwerpen/Gent) voor een stel met een kind van 3 jaar. Stemming: ${selectedMood}. Weer: ${selectedWeather}. Alle activiteiten moeten geschikt zijn voor een peuter van 3 jaar. Geef activiteiten die realistisch zijn in België en nu actueel zijn. Geef je antwoord ALLEEN als JSON array (geen uitleg, geen markdown), met exact dit formaat: [{"title":"...","description":"...","tags":["..."]}]. Tags kunnen zijn: 'buiten', 'peuter', 'gratis', 'museum', 'natuur', 'eten', 'creatief', 'stad'.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(`API fout ${res.status}: ${JSON.stringify(data)}`);
      }

      const text = data.content.map(i => i.text || '').join('');
      const clean = text.replace(/```json|```/g, '').trim();
      const activities = JSON.parse(clean);

      renderResults(activities, isDate);
    } catch (e) {
      document.getElementById('results').innerHTML = `<p style="color:var(--clay);font-size:.85rem;text-align:center;margin-top:20px;">Fout: ${e.message}</p>`;
    }

    document.getElementById('loading').style.display = 'none';
    btn.disabled = false;
    renderSaved();
  }

  function renderResults(activities, isDate) {
    const container = document.getElementById('results');
    container.innerHTML = '';

    activities.forEach((a, i) => {
      const isSaved = saved.some(s => s.title === a.title);
      const card = document.createElement('div');
      card.className = 'result-card';

      const tags = (a.tags || []).map(t => {
        const cls = t === 'peuter' || t === 'kindvriendelijk' ? 'toddler' : (t === 'romantisch' ? 'date' : '');
        return `<span class="tag ${cls}">${t}</span>`;
      }).join('');

      card.innerHTML = `
        <div class="card-header">
          <h3>${a.title}</h3>
          <button class="save-btn" onclick="toggleSave('${a.title.replace(/'/g,"\\'")}', '${a.description.replace(/'/g,"\\'")}', this)" title="Bewaren">
            ${isSaved ? '🔖' : '🤍'}
          </button>
        </div>
        <div class="card-tags">${tags}${isDate ? '<span class="tag date">date</span>' : '<span class="tag toddler">gezin</span>'}</div>
        <p class="card-desc">${a.description}</p>
      `;
      container.appendChild(card);
    });
  }

  function toggleSave(title, desc, btn) {
    const idx = saved.findIndex(s => s.title === title);
    if (idx > -1) {
      saved.splice(idx, 1);
      btn.textContent = '🤍';
    } else {
      saved.push({ title, desc });
      btn.textContent = '🔖';
    }
    localStorage.setItem('weekend_saved', JSON.stringify(saved));
    renderSaved();
  }

  function renderSaved() {
    const list = document.getElementById('savedList');
    const section = document.getElementById('savedSection');
    const divider = document.getElementById('savedDivider');

    if (saved.length === 0) {
      section.style.display = 'none';
      divider.style.display = 'none';
      return;
    }

    section.style.display = 'block';
    divider.style.display = 'block';
    list.innerHTML = '';

    saved.forEach(s => {
      const pill = document.createElement('div');
      pill.className = 'saved-pill';
      pill.innerHTML = `
        <span>${s.title}</span>
        <button class="unsave-btn" onclick="removeSaved('${s.title.replace(/'/g,"\\'")}')">✕</button>
      `;
      list.appendChild(pill);
    });
  }

  function removeSaved(title) {
    saved = saved.filter(s => s.title !== title);
    localStorage.setItem('weekend_saved', JSON.stringify(saved));
    renderSaved();
  }

  function clearSaved() {
    saved = [];
    localStorage.setItem('weekend_saved', JSON.stringify(saved));
    renderSaved();
  }

  // Init
  renderSaved();
  fetchWeather();
</script>
</body>
</html>
